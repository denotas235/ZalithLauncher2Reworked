name: Force Build (NDK 26.2.11394342)

on:
  workflow_dispatch:
    inputs:
      variant:
        description: "Build variant (Debug/Release)"
        required: true
        type: choice
        default: "Debug"
        options:
          - Debug
          - Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android NDK 26.2.11394342
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: "26.2.11394342"
          add-to-path: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (arm64)
        run: |
          chmod +x gradlew
          ./gradlew ZalithLauncher:assemble${{ inputs.variant }} -Darch=arm64 -Pandroid.ndkVersion=26.2.11394342

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: zalith-launcher-${{ inputs.variant }}-arm64
          path: ZalithLauncher/build/outputs/apk/${{ inputs.variant }}/*.apk
